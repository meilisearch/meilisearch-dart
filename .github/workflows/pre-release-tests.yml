# Testing the code base against the Meilisearch pre-releases
name: Pre-Release Tests

# Will only run for PRs and pushes to bump-meilisearch-v*
on:
  push:
    branches:
      - bump-meilisearch-v*
  pull_request:
    branches:
      - bump-meilisearch-v*

env:
  MEILISEARCH_URL: http://localhost:7700

jobs:
  integration-tests:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['latest']
    name: integration-tests-against-rc (dart ${{ matrix.version }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Get the latest Meilisearch RC
        run: echo "MEILISEARCH_VERSION=$(curl https://raw.githubusercontent.com/meilisearch/integration-guides/main/scripts/get-latest-meilisearch-rc.sh | bash)" >> $GITHUB_ENV
      - name: Setup Meilisearch RC with Docker
        run: docker run -d -p 7700:7700 getmeili/meilisearch-enterprise:$MEILISEARCH_VERSION meilisearch --master-key=masterKey --no-analytics
      - name: Wait for Meilisearch readiness
        run: |
          for i in {1..60}; do
            if curl -fsS "$MEILISEARCH_URL/health" > /dev/null; then
              echo "Meilisearch is ready at RC version $MEILISEARCH_VERSION"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Meilisearch did not become ready in time"
              exit 1
            fi
            sleep 1
          done
      - name: Run integration tests
        run: docker run --net="host" -v $PWD:/package -w /package dart:${{ matrix.version }} /bin/sh -c 'dart pub get && dart pub get -C tool && dart run test --concurrency=2'
